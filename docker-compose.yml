services:
  dora-assets:
    build: .
    container_name: dora-assets
    ports:
      - "8888:80"
    volumes:
      # Persistent application data. Bind mount is intentionally used so
      # SQLite model files remain visible in ./data and survive `docker compose down -v`.
      - type: bind
        source: ./data
        target: /data
    environment:
      DORA_DATA_DIR: /data
    restart: unless-stopped
